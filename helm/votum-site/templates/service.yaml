apiVersion: v1
kind: Service
metadata:
  name: {{ include "votum-site.fullname" . }}
  {{- with .Values.global.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "votum-site.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "votum-site.selectorLabels" . | nindent 4 }}
