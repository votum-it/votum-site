{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "votum-site.serviceAccountName" . }}
  {{- with .Values.global.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "votum-site.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
